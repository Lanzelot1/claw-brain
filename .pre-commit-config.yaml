repos:
  - repo: local
    hooks:
      - id: validate-json-schemas
        name: Validate JSON against schemas
        entry: scripts/validate-schemas.sh
        language: script
        files: \.json$
        pass_filenames: false
      - id: validate-knowledge-frontmatter
        name: Validate knowledge file frontmatter
        entry: scripts/validate-frontmatter.sh
        language: script
        files: ^knowledge/.*\.md$
        pass_filenames: false
