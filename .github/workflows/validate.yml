name: Validate

on:
  push:
    paths:
      - '**/*.json'
      - '**/*.schema.json'
      - 'knowledge/**/*.md'
  pull_request:
    paths:
      - '**/*.json'
      - '**/*.schema.json'
      - 'knowledge/**/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate JSON files against schemas
        run: ./scripts/validate-schemas.sh

      - name: Validate knowledge file frontmatter
        run: ./scripts/validate-frontmatter.sh
